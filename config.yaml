# Flux RSS génériques de critiques vin (contenu non filtré à la source,
# le script filtre par mots-clés).
feeds:
  - name: "Decanter"
    url: "https://www.decanter.com/wine-news/feed/"
  - name: "Jancis Robinson"
    url: "https://www.jancisrobinson.com/rss"

# Mots-clés utilisés pour filtrer les flux RSS directs ci-dessus (Decanter,
# Jancis Robinson). Ces sites sont 100% dédiés au vin, donc même des termes
# génériques de région ne posent pas de risque de faux positif ici.
keywords:
  - "Piémont"
  - "Piedmont"
  - "Barolo"
  - "Barbaresco"
  - "Nebbiolo"
  - "Langhe"
  - "Toscane"
  - "Tuscany"
  - "millésime"
  - "vintage report"
  - "Afrique du Sud vin"
  - "South Africa wine"

# Mots-clés utilisés spécifiquement pour les recherches Google News.
# Volontairement plus restreint : on exclut les noms de région génériques
# (Piémont, Toscane...) qui génèrent trop de faux positifs sur ce canal
# (tourisme, cinéma, actualité locale non-vin...). On ne garde que des
# termes déjà intrinsèquement liés au vin.
google_news_keywords:
  - "Barolo"
  - "Barbaresco"
  - "Nebbiolo"
  - "Langhe"
  - "millésime"
  - "vintage report"
  - "Afrique du Sud vin"
  - "South Africa wine"

# Nombre max d'articles Google News pris en compte par mot-clé à chaque run
# (les plus récents). Limite le bruit si un mot-clé est très actif.
google_news_max_per_keyword: 5
