name: Check wine news

on:
  schedule:
    # Une fois par jour à 6h UTC (8h heure d'été française)
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python watcher.py

      - name: Commit updated state
        run: |
          git config user.name "wine-news-bot"
          git config user.email "actions@github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "Update seen articles [skip ci]"
          git push
